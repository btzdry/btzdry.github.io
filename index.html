    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #ffffff;
            color: #000000;
            padding: 20px;
        }

        /* Fixed 350px container, completely clean and centered */
        .wrapper {
            width: 350px;
            max-width: 100%;
            text-align: center;
        }

        h1 {
            font-size: 26px;
            font-weight: 600;
            letter-spacing: -0.5px;
            margin-bottom: 4px;
        }

        .status {
            font-size: 13px;
            color: #777777;
            margin-bottom: 28px;
        }

        /* Displays links in a clean single row */
        .links-row {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap; /* Prevents breaking on tiny mobile screens */
        }

        /* Clean plain text inline links */
        .links-row a {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            color: #000000;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s ease;
            padding: 4px 0; /* Makes them easier to touch on mobile */
        }

        .links-row a svg {
            width: 15px;
            height: 15px;
            fill: #777777;
            transition: fill 0.2s ease;
        }

        /* Specific platform color shifts on hover */
        .links-row a.spotify:hover {
            color: #1DB954;
        }
        .links-row a.spotify:hover svg {
            fill: #1DB954;
        }

        .links-row a.twitter:hover {
            color: #000000;
        }
        .links-row a.twitter:hover svg {
            fill: #000000;
        }

        .links-row a.instagram:hover {
            color: #E1306C;
        }
        .links-row a.instagram:hover svg {
            fill: #E1306C;
        }

        /* Extra safety adjustment for tiny phone displays */
        @media (max-width: 360px) {
            .links-row {
                gap: 14px;
            }
            .links-row a {
                font-size: 13px;
            }
        }
    </style>
</head>
